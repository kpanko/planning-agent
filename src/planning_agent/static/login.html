<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning Agent — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #262626;
      border: 1px solid #3f3f46;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    p.sub {
      font-size: 0.875rem;
      color: #9ca3af;
      margin-bottom: 2rem;
    }

    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #fff;
      color: #1f1f1f;
      border: none;
      border-radius: 6px;
      padding: 0.65rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-google:hover { background: #f0f0f0; }

    .btn-google svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .error {
      margin-top: 1.25rem;
      background: #3b1212;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Planning Agent</h1>
    <p class="sub">Sign in to continue</p>

    <a href="/login/google" class="btn-google">
      <!-- Google "G" logo -->
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335"
          d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0
             14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4"
          d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94
             c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05"
          d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59
             l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853"
          d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6
             c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91
             l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Sign in with Google
    </a>

    <!-- shown when ?error=1 -->
    <div id="err" class="error" style="display:none">
      Sign-in failed or account not authorised.
    </div>
  </div>

  <script>
    if (new URLSearchParams(location.search).get("error")) {
      document.getElementById("err").style.display = "block";
    }
  </script>
</body>
</html>
