# fly.toml — generated for planning-agent web UI
# Run `fly launch` once to create the app, then `fly deploy` to ship updates.

app = "planning-agent"          # change if this name is taken on Fly
primary_region = "ord"          # Chicago — pick closest: sea, lax, iad, ewr, etc.

[build]

[env]
  PLANNING_AGENT_DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"   # stop when idle (pay only when in use)
  auto_start_machines = true
  min_machines_running = 0      # 0 = stopped when idle

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "planning_agent_data"
  destination = "/data"
  initial_size = "1gb"
